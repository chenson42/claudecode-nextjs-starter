name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          # Build needs these to resolve, but no live data is hit.
          DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
          AUTH_SECRET: "ci-secret-do-not-use-in-prod"
          AUTH_URL: "http://localhost:3000"
          AUTH_TOTP_ENCRYPTION_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="

      - name: Audit-log invariant check
        run: npm run check:audit

      - name: Unit tests
        run: npm test
